<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telos — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 36px 32px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .login-logo { font-size: 32px; text-align: center; }
    h1 { font-size: 16px; font-weight: 600; text-align: center; color: #e6edf3; }
    .login-sub { font-size: 13px; color: #7d8590; text-align: center; margin-top: 4px; }
    label { font-size: 13px; color: #7d8590; display: block; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #58a6ff; }
    button {
      width: 100%;
      background: #238636;
      border: 1px solid rgba(240,246,252,0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 9px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .error { font-size: 12px; color: #f85149; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🛰️</div>
    <div>
      <h1>Mission Control</h1>
      <p class="login-sub">Enter passphrase to continue</p>
    </div>
    <div>
      <label for="passphrase">Passphrase</label>
      <input type="password" id="passphrase" autofocus placeholder="••••••••••••" />
    </div>
    <div class="error" id="error"></div>
    <button id="btn">Sign in</button>
  </div>
  <script>
    const btn   = document.getElementById('btn');
    const input = document.getElementById('passphrase');
    const errEl = document.getElementById('error');

    async function login() {
      const passphrase = input.value.trim();
      if (!passphrase) return;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.textContent = '';
      try {
        const res  = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passphrase }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        localStorage.setItem('mc_token', data.token);
        window.location.href = '/';
      } catch {
        errEl.textContent = 'Network error — is the server running?';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    btn.addEventListener('click', login);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
